plugin:dynamic-cursors {

    # включает плагин
    enabled = true

    # устанавливает поведение курсора, поддерживает следующие значения:
    # tilt    - наклонять курсор в зависимости от скорости по оси x
    # rotate  - вращать курсор в зависимости от направления движения
    # stretch - растягивать форму курсора в зависимости от направления и скорости
    # none    - не изменять поведение курсора
    mode = tilt

    # минимальная разница углов в градусах, после которой форма изменяется
    # меньшие значения обеспечивают более плавное движение, но более затратны для аппаратных курсоров
    threshold = 2

    # переопределить поведение режима для каждой формы
    # это ключевое слово, и его можно повторять много раз
    # по умолчанию правила не добавлены
    # смотрите специальный раздел `shape rules` ниже!
    # shaperule = <имя-формы>, <режим> (необязательно), <свойство>: <значение>, ...
    # shaperule = <имя-формы>, <режим> (необязательно), <свойство>: <значение>, ...
    # ...

    # для режима = rotate
    rotate {

        # длина в пикселях имитируемого стержня, используемого для вращения курсора
        # наиболее реалистично, если это ваш фактический размер курсора
        length = 20

        # смещение по часовой стрелке, применяемое к углу в градусах
        # это будет применяться ко ВСЕМ формам
        offset = 0.0
    }
    #
    # для режима = tilt
    tilt {

        # контролирует, насколько сильным будет наклон, чем ниже, тем больше сила
        # это значение контролирует, при какой скорости (px/s) достигается полный наклон
        # полный наклон составляет 60° в обоих направлениях
        limit = 1000 #5000

        # зависимость между скоростью и наклоном, поддерживает следующие значения:
        # linear             - используется линейная функция
        # quadratic          - используется квадратичная функция (наиболее реалистично для имитации сопротивления воздуха)
        # negative_quadratic - отрицательная версия квадратичной, ощущается более агрессивной
        # смотрите `activation` в `src/mode/utils.cpp` для точного описания расчета
        function = negative_quadratic

        # временное окно (мс), за которое рассчитывается скорость
        # более высокие значения сделают медленные движения более плавными, но с большей задержкой
        window = 200 # 100
    }

    # для режима = stretch
    # stretch {
    #
    #     # контролирует, насколько сильно растягивается курсор
    #     # это значение контролирует, при какой скорости (px/s) достигается полное растяжение
    #     # полное растяжение составляет двойную первоначальную длину
    #     limit = 3000
    #
    #     # зависимость между скоростью и величиной растяжения, поддерживает следующие значения:
    #     # linear             - используется линейная функция
    #     # quadratic          - используется квадратичная функция
    #     # negative_quadratic - отрицательная версия квадратичной, ощущается более агрессивной
    #     # смотрите `activation` в `src/mode/utils.cpp` для точного описания расчета
    #     function = quadratic
    #
    #     # временное окно (мс), за которое рассчитывается скорость
    #     # более высокие значения сделают медленные движения более плавными, но с большей задержкой
    #     window = 100
    # }

    # настроить встряхивание для поиска
    # увеличивает курсор, если его встряхивают
    shake {

        # включает встряхивание для поиска
        enabled = true

        # использовать масштабирование по ближайшему соседу (пикселизация) при встряхивании
        # может выглядеть странно, если включены эффекты
        nearest = true #false #true

        # контролирует, как быстро обнаруживается встряхивание
        # меньшие значения означают более быстрое обнаружение
        threshold = 3.0 #Extracts themes from generated xcursor themes in the hyprcu

        # уровень увеличения сразу после начала встряхивания
        base = 4.0
        # увеличение масштаба в секунду при продолжении встряхивания
        speed = 2.0#4.0
        # насколько на скорость влияет текущая интенсивность встряхивания
        influence = 0.5 #0.0

        # максимальное увеличение, которого может достичь курсор
        # значения ниже 1 отключают ограничение (например, 0)
        limit = 0.0

        # время в миллисекундах, в течение которого курсор будет оставаться увеличенным после окончания встряхивания
        timeout = 2000

        # показывать поведение курсора `tilt`, `rotate` и т.д. во время встряхивания
        effects = true #false

        # включить события ipc для встряхивания
        # смотрите раздел `ipc` ниже
        ipc = false
    }

    # использовать hyprcursor для получения текстуры с более высоким разрешением при увеличении курсора
    # смотрите раздел `hyprcursor` ниже
    hyprcursor {

        # использовать масштабирование по ближайшему соседу (пикселизация) при увеличении сверх размера текстуры
        # это также будет иметь эффект без включенной поддержки hyprcursor
        # 0 / false - никогда не использовать пиксельное масштабирование
        # 1 / true  - использовать пикселизацию, если нет изображения высокого разрешения
        # 2         - всегда использовать пиксельное масштабирование
        nearest = 1#true # false #true

        # включить выделенную поддержку hyprcursor
        enabled = true

        # разрешение в пикселях для загрузки увеличенных форм
        # имейте в виду, что загрузка изображения с очень высоким разрешением займет много времени и может повлиять на потребление памяти
        # -1 означает, что мы используем [нормальный размер курсора] * [опция shake:base]
        resolution = 128

        # форма, используемая при увеличении курсоров на стороне клиента
        # смотрите свойство shape-name правил форм для возможных имен
        # указание clientside будет использовать фактическую форму, но она будет пикселизирована
        fallback = clientside
    }
}
