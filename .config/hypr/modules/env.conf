#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variab    les/

# env = HYPRCURSOR_PATH, /usr/share/icons
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = XCURSOR_SIZE,24
# env = GTK_THEME, Orchis-Purple-Dark
# Screenshots dir
env = HYPRSHOT_DIR, /home/pundemia/Pictures/Screenshots

env = QT_QPA_PLATFORMTHEME, gtk3
env = TDESKTOP_I_KNOW_ABOUT_GTK_INCOMPATIBILITY, 1
# ######## Toolkit backends ########
env = GDK_BACKEND, wayland,x11
# env = QT_QPA_PLATFORM, wayland;xcb
env = SDL_VIDEODRIVER, wayland,x11,windows
env = CLUTTER_BACKEND, wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# ####### XDG specifications #######
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# ############# Others #############
env = _JAVA_AWT_WM_NONREPARENTING, 1
# env = EDITOR, zeditor
env = EDITOR, nvim

