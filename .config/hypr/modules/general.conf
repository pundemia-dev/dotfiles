#####################
### LOOK AND FEEL ###
#####################
source = ~/.config/hypr/modules/colors.conf
# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 2
    # gaps_out = 4

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = 0xff$surface_bright
    col.inactive_border = 0xff$surface
    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = scrolling#dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    active_opacity = 0.89
    inactive_opacity = 0.89
    blur {
        enabled = yes
        size = 2
        passes = 3
        new_optimizations = yes
        contrast = 1
        brightness = 1
    }
    # rounding = 14
    # rounding_power=1

    shadow {
      enabled = true
      range = 10
      render_power = 2
      color = rgba(0, 0, 0, 0.25)
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
# animations {
#     enabled = yes
#     bezier = myBezier, 0.4, 0.0, 0.2, 1.0
#     animation = windows, 1, 2.5, myBezier, popin 80%
#     animation = border, 1, 2.5, myBezier
#     animation = fade, 1, 2.5, myBezier
#     animation = workspaces, 1, 2.5, myBezier, slidefadevert 20%
# }

animations {
    enabled = yes

	# bezier= b0,0,1,0,1.028
 #    bezier= bubbleMove,0.22, 1.84, 0.24, 0.93
	# bezier= b1,0,1.1,0,1.05
	#
	# animation = windows,1,2,default,slide
	# animation = windowsIn,1,2,default,popin 50%
	# animation = windowsOut,1,4,bubbleMove,slide
	# animation = workspaces,1,5,bubbleMove,slidefadevert
    bezier = bubblyWidth, 0.23, 1.76, 0.05, 1.0
    bezier = bubblyHeight, 0.43, 1.72, 0.35, 0.96
    bezier = bubblyMove, 0.22, 1.84, 0.24, 0.93

    # --- Применение ---
    
    # Открытие окон: используем bubblyWidth для эффекта "выпрыгивания"
    # popin 80% означает, что окно начнет расти с 80% размера (меньше мельтешения)
    animation = windowsIn, 1, 5, bubblyWidth, popin 80%

    # Закрытие окон: используем bubblyHeight (чуть спокойнее)
    animation = windowsOut, 1, 5, bubblyHeight, popin 80%

    # Движение окон: самая "желейная" кривая bubblyMove
    # Это будет видно, когда окна меняют размер или меняются местами
    animation = windowsMove, 1, 5, bubblyMove

    # Смена рабочих столов: bubblyHeight
    animation = workspaces, 1, 5, bubblyHeight, slidefadevert

    # (Опционально) Прозрачность и границы - линейно или стандартно
    animation = fade, 1, 3, default
    animation = border, 1, 3, default
}
# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]
# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}
# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}
# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    vfr = true # delete if not notebook
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

