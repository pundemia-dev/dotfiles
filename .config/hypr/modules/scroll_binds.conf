###################
### KEYBINDINGS ###
###################
$mainMod = SUPER # Sets "Windows" key as main modifier

$terminal = kitty
$fileManager = nautilus
$browser = zen-browser

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, Z, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, L, exec, hyprlock

bind =, PRINT, exec, flameshot gui
# bind =, PRINT, exec, ~/.config/hypr/scripts/hyprshot-num.sh
bind =SHIFT, PRINT, exec, hypruler
bind = $mainMod ALT, C, exec, hyprpicker -a -n# -f rgb

bind = $mainMod, F, togglefloating,
bind = $mainMod, M, exec, ~/.config/hypr/modules/scripts/column_maximize.sh # dwindle
bindo = $mainMod, M, fullscreen, 0 # dwindle
bind = $mainMod, BracketLeft, exec, kitty
bind = $mainMod, S, layoutmsg, togglesplit # dwindle
bind = $mainMod, C, killactive,
# bind = $mainMod, P, pseudo,

# Move focus with mainMod + arrow keys
# dwindle
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-    9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move icons
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move windows
binde = $mainMod ALT, right, moveactive, 50 0
binde = $mainMod ALT, left, moveactive, -50 0
binde = $mainMod ALT, up, moveactive, 0 -50
binde = $mainMod ALT, down, moveactive, 0 50

# Resize windows
binde = $mainMod CTRL, left, resizeactive,-50 0
binde = $mainMod CTRL, right, resizeactive,50 0
binde = $mainMod CTRL, up, resizeactive,0 -50
binde = $mainMod CTRL, down, resizeactive,0 50

# Example special workspace (scratchpad)
bind = $mainMod, W, togglespecialworkspace, magic
bind = $mainMod SHIFT, W, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+; [ $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}') -gt 100 ] && wpctl set-volume @DEFAULT_AUDIO_SINK@ 100%
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 20%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 20%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Scrolling
bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col
# bind = $mainMod SHIFT, period, layoutmsg, movewindowto r
# bind = $mainMod SHIFT, comma, layoutmsg, movewindowto l
# bind = $mainMod SHIFT, up, layoutmsg, movewindowto u
# bind = $mainMod SHIFT, down, layoutmsg, movewindowto d
bind = $mainMod, equal, layoutmsg, colresize +conf
bind = $mainMod, minus, layoutmsg, colresize -conf
bind = $mainMod SHIFT, equal, layoutmsg, colresize +0.1
bind = $mainMod SHIFT, minus, layoutmsg, colresize -0.1
bind = $mainMod, p, layoutmsg, promote
bind = $mainMod, f, layoutmsg, togglefit
bind = $mainMod, s, layoutmsg, swapcol r
bind = $mainMod, a, layoutmsg, swapcol l
# bind = $mainMod, 1, layoutmsg, movecoltoworkspace 1
# bind = $mainMod, 2, layoutmsg, movecoltoworkspace 2
# bind = $mainMod, 3, layoutmsg, movecoltoworkspace 3

bind = $mainMod ALT, S, exec, notify-send 'Enter to pShell'"'"'s submap' #"Enter to pShell's submap"
bind = $mainMod ALT, S, submap, pShell
submap = pShell
bind = , w, exec, matugen --type scheme-neutral image "$(find ~/Pictures/Wallpapers -maxdepth 1 -type f | shuf -n 1)"
bind = , escape, exec, notify-send 'Exit from pShell'"'"'s submap' #"Enter to pShell's submap"
bind = , escape, submap, reset
submap = reset
