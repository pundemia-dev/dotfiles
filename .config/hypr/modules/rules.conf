##############################
### WINDOWS AND WORKSPACES ###
##############################
# windowrule = suppressevent maximize, class:.*
# Fix some dragging issues with XWayland
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Kitty
# windowrule = pseudo on, match:class kitty
# windowrule = size (monitor_w*0.5) (monitor_h*0.5), match:class kitty

windowrule {
    name = kitty
    match:class = kitty
    # scrolling_width = 0.5
    pseudo = on
    size = (monitor_w*0.5) (monitor_h*0.5)
}

windowrule {
    name = Affinity
    match:initial_title = Affinity
    no_blur = on
    opacity = 10
}

# Telegram
windowrule = workspace special:magic,match:class org.telegram.desktop
windowrule = float on,match:class org.telegram.desktop
windowrule = move 1501 167,match:class org.telegram.desktop
windowrule = size 400 750,match:class org.telegram.desktop

# File-chooser
windowrule {
    name = file-chooser
    match:initial_title = (File Upload|Choose Files|Save Image|Save File)*
    float = on
    size = 600 350
    move = (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5))
}

# File-manager
windowrule = pseudo on, match:class org.gnome.Nautilus
windowrule = size 930 530, match:class org.gnome.Nautilus

# Firefox picture-in-picture
windowrule = float on,match:initial_title (Picture-in-Picture)
windowrule = pin on,match:initial_title (Picture-in-Picture)
windowrule = opacity 1.0 override,match:initial_title (Picture-in-Picture)
windowrule = no_blur on,match:initial_title (Picture-in-Picture)
windowrule = size 700 400, match:initial_title (Picture-in-Picture)
windowrule = move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5)),match:initial_title (Picture-in-Picture)

# Calc
windowrule = float on, match:class org.gnome.Calculator
windowrule = size 390 616,match:class org.gnome.Calculator
windowrule = move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5)),match:class org.gnome.Calculator

# freerdp
windowrule = tile on, match:class xfreerdp

# Gapless
windowrule = float on,match:initial_title Gapless
windowrule = size 720 580, match:initial_title Gapless
windowrule = workspace special:magic, match:initial_title Gapless

# Flameshot
windowrule {
    name = flameshot-multi-display-fix
    match:class = flameshot

    animation = fade
    rounding = 0
    border_size = 0
    fullscreen_state = 0 0
    float = on
    pin = on
    # monitor = HDMI-A-1
    monitor = DP-1
    move = 0 0
    size = (monitor_w) (monitor_h*2)
}

