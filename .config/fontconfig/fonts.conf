<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- 1. ЛЕЧИМ DANK MONO (Оставляем как было) -->
  <match target="scan">
    <test name="family">
      <string>Dank Mono</string>
    </test>
    <edit name="spacing">
      <int>100</int>
    </edit>
  </match>

  <!-- 2. НАЗНАЧАЕМ SOFIA SANS (Только для Sans/System-ui) -->
  <!-- Используем "append", чтобы не перекрывать всё на свете жестко -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Sofia Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>system-ui</family>
    <prefer>
      <family>Sofia Sans</family>
    </prefer>
  </alias>

  <!-- 3. ЗАПРЕЩАЕМ FONTCONFIG ТРОГАТЬ МЕТРИКИ В ТЕРМИНАЛЕ -->
  <!-- Если какой-то софт просит Monospace, не подсовываем ему Sofia -->
  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Dank Mono</string>
    </edit>
  </match>

</fontconfig>
