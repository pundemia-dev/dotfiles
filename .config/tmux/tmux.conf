unbind-key -a -T root

setw -g mode-keys vi

# Set default shell
set-option -g default-shell $SHELL

# Set true color
set-option -sa terminal-overrides ",xterm*:Tc"

# Set mouse mode on
set -g mouse on
set -s escape-time 0
set -g history-limit 2000




# unbind C-b
# set -g prefix M
# bind M send-prefix

bind -n M-r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind -n M-s choose-tree -r

bind -n M-1 select-window -t 1
bind -n M-3 select-window -t 3
bind -n M-2 select-window -t 2
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 3
bind -n M-S-Down resize-pane -D M-3

bind -n M-h split-window -v
bind -n M-v split-window -h

bind -n M-c kill-pane
bind -n M-q kill-window
bind -n M-d detach
bind -n M-Q confirm-before -p "Kill entire session? (y/n)" kill-session

bind -n M-Enter new-window

# Shift Alt vim keys to switch windows
# bind -n M-H previous-window
# bind -n M-L next-window

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Theme: borders
set -g pane-border-lines single
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=red

# Theme: status
set -g status-style bg=default,fg=brightblack
set -g status-left "#[fg=brightblack,bright]#(basename \"#{pane_current_path}\")"
set -g status-right "#[fg=brightblack,bright]#S"

# Theme: status (windows)
# set -g window-status-format "●"
# set -g window-status-current-format "●"
# set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=red,nobold}"
# set -g window-status-bell-style "fg=red,nobold"
# set -g status-justify absolute-centre
# Theme: status (windows)
# Устанавливаем формат: если зум (window_zoomed_flag) -> желтый цвет, иначе -> красный.
set -g window-status-current-format "#{?window_zoomed_flag,#[fg=yellow],#[fg=red]}●"

# Обычный формат для неактивных окон
set -g window-status-format "●"

# Сброс стиля (цвет теперь задается внутри формата выше)
set -g window-status-current-style "bg=default"
set -g window-status-bell-style "fg=red,bold"
set -g status-justify absolute-centre

# Set vi-mode

# Yazi
set -g allow-passthrough on

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Open panes in current directory
bind - split-window -c '#{pane_current_path}'
bind v split-window -h -c '#{pane_current_path}'

run '~/.tmux/plugins/tpm/tpm'
